# Server Configuration
server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=${JDBC_DATABASE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/agritrade}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}
spring.datasource.hikari.connection-timeout=${DB_POOL_TIMEOUT:20000}

## JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:change-me-in-production}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ImageKit Configuration
imagekit.private-key=${IMAGEKIT_PRIVATE_KEY:}
imagekit.public-key=${IMAGEKIT_PUBLIC_KEY:}
imagekit.url-endpoint=${IMAGEKIT_URL_ENDPOINT:}

# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# Logging Configuration
logging.level.org.agri.agritrade=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.hibernate.SQL=${LOG_LEVEL_HIBERNATE_SQL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_LEVEL_HIBERNATE_BINDER:WARN}

# Security Configuration
spring.security.require-ssl=${REQUIRE_SSL:false}

# TextBee SMS Configuration
textbee.api-key=${TEXTBEE_API_KEY:}
textbee.device-id=${TEXTBEE_DEVICE_ID:}

# Application Configuration
app.name=krishi-setu
app.version=1.0.0
app.description=Agricultural Trading Platform

# Email Configuration (Gmail SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
